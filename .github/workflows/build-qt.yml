name: Build GUI App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux-x64
            smoke_command: dist/DDALAB/DDALAB --smoke-test
            archive_name: DDALAB-gui-linux-x64.tar.gz
          - os: macos-latest
            artifact_suffix: macos
            smoke_command: dist/DDALAB/DDALAB --smoke-test
            archive_name: DDALAB-gui-macos.tar.gz
          - os: windows-latest
            artifact_suffix: windows-x64
            smoke_command: dist/DDALAB/DDALAB.exe --smoke-test
            archive_name: DDALAB-gui-windows-x64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Qt runtime dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libxcb-cursor0 \
            patchelf

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./packages/dda-cli -> target"

      - name: Stage bundled runtime backend
        working-directory: packages/ddalab-cli
        run: python scripts/prepare_runtime.py --clean --print-dir

      - name: Install CLI + GUI packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e packages/ddalab-cli -e packages/ddalab-gui pyinstaller

      - name: Build frozen Qt bundle
        working-directory: packages/ddalab-gui
        run: pyinstaller DDALAB.spec --noconfirm

      - name: Smoke test frozen bundle (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: packages/ddalab-gui
        env:
          QT_QPA_PLATFORM: offscreen
        run: ${{ matrix.smoke_command }}

      - name: Smoke test frozen bundle (Windows)
        if: runner.os == 'Windows'
        working-directory: packages/ddalab-gui
        run: ${{ matrix.smoke_command }}

      - name: Archive bundle (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: packages/ddalab-gui
        run: tar -czf "${{ matrix.archive_name }}" -C dist DDALAB

      - name: Archive bundle (Windows)
        if: runner.os == 'Windows'
        working-directory: packages/ddalab-gui
        shell: pwsh
        run: Compress-Archive -Path dist/DDALAB/* -DestinationPath ${{ matrix.archive_name }}

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ddalab-gui-${{ matrix.artifact_suffix }}
          path: packages/ddalab-gui/${{ matrix.archive_name }}

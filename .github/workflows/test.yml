name: DDALAB Python Smoke Tests

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  cli-and-gui-smoke:
    name: CLI and GUI Smoke
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libxcb-cursor0 \
            patchelf

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./packages/dda-cli -> target"

      - name: Stage bundled runtime backend
        working-directory: packages/ddalab-cli
        run: python scripts/prepare_runtime.py --clean --print-dir

      - name: Install editable CLI + GUI packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e packages/ddalab-cli -e packages/ddalab-gui

      - name: Verify CLI help
        run: ddalab --help

      - name: Verify CLI health
        run: ddalab health --json

      - name: Smoke test GUI entry point
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m ddalab_gui --smoke-test

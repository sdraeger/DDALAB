name: Cross-Language Conformance

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  conformance:
    name: Contract Conformance (Rust + Python + Julia)
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./packages/dda-rs -> target

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e packages/dda-py pytest

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"

      - name: Run cross-language conformance suite
        run: bash scripts/run-conformance-suite.sh

name: Release Desktop App

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Version to release, for example 1.2.9. Defaults to the unified ddalab package version."
        required: false
        type: string
      publish_release:
        description: "Create or update the GitHub release after building."
        required: false
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      publish_release: ${{ steps.version.outputs.publish_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.release_version }}
          INPUT_PUBLISH: ${{ github.event.inputs.publish_release }}
        run: |
          if [[ "$EVENT_NAME" == "push" ]]; then
            version="${REF_NAME#v}"
            publish_release="true"
          else
            if [[ -n "$INPUT_VERSION" ]]; then
              version="$INPUT_VERSION"
            else
              version="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          payload = tomllib.loads(Path("packages/ddalab/pyproject.toml").read_text())
          print(payload["project"]["version"])
          PY
          )"
            fi
            publish_release="${INPUT_PUBLISH:-true}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+)?$ ]]; then
            echo "Unsupported release version: $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"

      - name: Verify Python package versions
        shell: bash
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          expected = os.environ["EXPECTED_VERSION"]
          checks = {
              "packages/ddalab/pyproject.toml": tomllib.loads(
                  Path("packages/ddalab/pyproject.toml").read_text()
              )["project"]["version"],
          }
          mismatches = [
              f"{path}: expected {expected}, found {actual}"
              for path, actual in checks.items()
              if actual != expected
          ]
          if mismatches:
              raise SystemExit("\n".join(mismatches))
          PY

  build:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            arch: x64
            dist_mode: dir
          - runner: windows-latest
            platform: windows
            arch: x64
            dist_mode: dir
          - runner: macos-15-intel
            platform: macos
            arch: x64
            dist_mode: dir
          - runner: macos-14
            platform: macos
            arch: arm64
            dist_mode: dir

    runs-on: ${{ matrix.runner }}
    env:
      DDALAB_VERSION: ${{ needs.resolve.outputs.version }}
      DDALAB_TAG: ${{ needs.resolve.outputs.tag }}
      DDALAB_DIST_MODE: ${{ matrix.dist_mode }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./packages/dda-rs -> target"

      - name: Require macOS signing configuration for published releases
        if: runner.os == 'macOS' && needs.resolve.outputs.publish_release == 'true'
        shell: bash
        env:
          APPLE_SIGNING_CERTIFICATE_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_BASE64 }}
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          missing=()
          for key in \
            APPLE_SIGNING_CERTIFICATE_BASE64 \
            APPLE_SIGNING_CERTIFICATE_PASSWORD \
            APPLE_KEYCHAIN_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_NOTARY_APPLE_ID \
            APPLE_NOTARY_TEAM_ID \
            APPLE_NOTARY_PASSWORD
          do
            if [[ -z "${!key}" ]]; then
              missing+=("$key")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "Missing required macOS signing/notarization secrets: ${missing[*]}" >&2
            exit 1
          fi

      - name: Install Linux Qt runtime dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libxcb-cursor0 \
            patchelf

      - name: Stage bundled runtime backend
        working-directory: packages/ddalab
        shell: bash
        run: python scripts/prepare_runtime.py --clean --print-dir

      - name: Install desktop build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e packages/ddalab pyinstaller

      - name: Install macOS signing certificate
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_SIGNING_CERTIFICATE_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_BASE64 }}
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$APPLE_SIGNING_CERTIFICATE_BASE64" || -z "$APPLE_SIGNING_CERTIFICATE_PASSWORD" || -z "$APPLE_KEYCHAIN_PASSWORD" ]]; then
            echo "Mac signing secrets not configured; continuing without codesign setup."
            exit 0
          fi
          cert_path="$RUNNER_TEMP/ddalab-signing-cert.p12"
          keychain_path="$RUNNER_TEMP/ddalab-build.keychain-db"
          echo "$APPLE_SIGNING_CERTIFICATE_BASE64" | base64 --decode > "$cert_path"
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$cert_path" \
            -k "$keychain_path" \
            -P "$APPLE_SIGNING_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$APPLE_KEYCHAIN_PASSWORD" "$keychain_path"

      - name: Build frozen desktop bundle
        working-directory: packages/ddalab
        shell: bash
        run: pyinstaller DDALAB.spec --noconfirm --clean

      - name: Download AppImage tooling
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/appimage-tools"
          curl -L https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -o "$RUNNER_TEMP/appimage-tools/appimagetool.AppImage"
          chmod +x "$RUNNER_TEMP/appimage-tools/appimagetool.AppImage"

      - name: Codesign macOS app bundle
        if: runner.os == 'macOS'
        working-directory: packages/ddalab
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [[ -z "$APPLE_SIGNING_IDENTITY" ]]; then
            echo "Mac signing identity not configured; leaving app unsigned."
            exit 0
          fi
          codesign \
            --force \
            --deep \
            --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            dist/DDALAB.app
          codesign --verify --deep --strict dist/DDALAB.app

      - name: Notarize macOS app bundle
        if: runner.os == 'macOS'
        working-directory: packages/ddalab
        shell: bash
        env:
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          if [[ -z "$APPLE_NOTARY_APPLE_ID" || -z "$APPLE_NOTARY_TEAM_ID" || -z "$APPLE_NOTARY_PASSWORD" ]]; then
            echo "Mac notarization secrets not configured; skipping notarization."
            exit 0
          fi
          notarize_zip="$RUNNER_TEMP/DDALAB-notarize.zip"
          ditto -c -k --keepParent dist/DDALAB.app "$notarize_zip"
          xcrun notarytool submit "$notarize_zip" \
            --apple-id "$APPLE_NOTARY_APPLE_ID" \
            --team-id "$APPLE_NOTARY_TEAM_ID" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --wait
          xcrun stapler staple dist/DDALAB.app

      - name: Smoke test frozen Linux binary
        if: runner.os == 'Linux'
        working-directory: packages/ddalab
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: dist/DDALAB/DDALAB --smoke-test

      - name: Smoke test frozen macOS app
        if: runner.os == 'macOS'
        working-directory: packages/ddalab
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: dist/DDALAB.app/Contents/MacOS/DDALAB --smoke-test

      - name: Smoke test frozen Windows bundle
        if: runner.os == 'Windows'
        working-directory: packages/ddalab
        shell: pwsh
        run: dist/DDALAB/DDALAB.exe --smoke-test

      - name: Package Linux release assets
        if: runner.os == 'Linux'
        working-directory: packages/ddalab
        shell: bash
        run: |
          mkdir -p ../../release-assets
          appdir="$RUNNER_TEMP/DDALAB.AppDir"
          rm -rf "$appdir"
          mkdir -p \
            "$appdir/usr/bin" \
            "$appdir/usr/share/applications" \
            "$appdir/usr/share/icons/hicolor/256x256/apps"
          cp -a dist/DDALAB/. "$appdir/usr/bin/"
          cat > "$appdir/DDALAB.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=DDALAB
          Exec=DDALAB
          Icon=ddalab
          Categories=Science;Education;
          Terminal=false
          EOF
          cp "$appdir/DDALAB.desktop" "$appdir/usr/share/applications/DDALAB.desktop"
          install -m 644 ddalab_qt/assets/icons/icon.png "$appdir/ddalab.png"
          install -m 644 ddalab_qt/assets/icons/icon.png "$appdir/usr/share/icons/hicolor/256x256/apps/ddalab.png"
          cat > "$appdir/AppRun" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          export APPDIR="$HERE"
          exec "$HERE/usr/bin/DDALAB" "$@"
          EOF
          chmod +x "$appdir/AppRun"
          ARCH=x86_64 "$RUNNER_TEMP/appimage-tools/appimagetool.AppImage" \
            --appimage-extract-and-run \
            "$appdir" \
            "../../release-assets/DDALAB-${DDALAB_VERSION}-linux-x64.AppImage"

      - name: Package macOS release assets
        if: runner.os == 'macOS'
        working-directory: packages/ddalab
        shell: bash
        env:
          DDALAB_ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p ../../release-assets
          ditto -c -k --keepParent dist/DDALAB.app "../../release-assets/DDALAB-${DDALAB_VERSION}-macos-${DDALAB_ARCH}-app.zip"
          dmg_staging="$(mktemp -d)"
          trap 'rm -rf "$dmg_staging"' EXIT
          ditto dist/DDALAB.app "$dmg_staging/DDALAB.app"
          ln -s /Applications "$dmg_staging/Applications"
          hdiutil create \
            -volname "DDALAB" \
            -srcfolder "$dmg_staging" \
            -ov \
            -format UDZO \
            "../../release-assets/DDALAB-${DDALAB_VERSION}-macos-${DDALAB_ARCH}.dmg"

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Package Windows release assets
        if: runner.os == 'Windows'
        working-directory: packages/ddalab
        shell: pwsh
        run: |
          $sourceDir = Join-Path $PWD "dist\DDALAB"
          $outputDir = [System.IO.Path]::GetFullPath((Join-Path $PWD "..\..\release-assets"))
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
          Compress-Archive -Path "$sourceDir\*" -DestinationPath (Join-Path $outputDir "DDALAB-$env:DDALAB_VERSION-windows-x64-portable.zip") -Force
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=$env:DDALAB_VERSION" `
            "/DSourceDir=$sourceDir" `
            "/DOutputDir=$outputDir" `
            "installer\DDALAB.iss"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-assets/*

  publish:
    if: needs.resolve.outputs.publish_release == 'true'
    needs:
      - resolve
      - build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DDALAB_VERSION: ${{ needs.resolve.outputs.version }}
      DDALAB_TAG: ${{ needs.resolve.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download built release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Ensure release tag exists
        shell: bash
        run: |
          if git rev-parse "$DDALAB_TAG" >/dev/null 2>&1; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$DDALAB_TAG" "$GITHUB_SHA"
          git push origin "$DDALAB_TAG"

      - name: Create or update GitHub release
        shell: bash
        run: |
          if gh release view "$DDALAB_TAG" >/dev/null 2>&1; then
            gh release edit "$DDALAB_TAG" --title "DDALAB $DDALAB_VERSION"
          else
            gh release create "$DDALAB_TAG" \
              --title "DDALAB $DDALAB_VERSION" \
              --notes "Automated desktop release for DDALAB $DDALAB_VERSION."
          fi

      - name: Upload release assets
        shell: bash
        run: gh release upload "$DDALAB_TAG" release-assets/* --clobber

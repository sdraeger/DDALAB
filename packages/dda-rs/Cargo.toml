[package]
name = "dda-rs"
version = "0.2.0"
edition = "2021"
authors = ["DDALAB Contributors"]
description = "Pure Rust Delay Differential Analysis engine"
license = "MIT"
repository = "https://github.com/sdraeger/DDALAB"
homepage = "https://github.com/sdraeger/DDALAB/tree/main/packages/dda-rs"
documentation = "https://docs.rs/dda-rs"
keywords = ["dda", "delay-differential", "analysis", "eeg", "time-series"]
categories = ["science", "api-bindings"]
readme = "README.md"
include = [
	"Cargo.toml",
	"README.md",
	"LICENSE",
	"src/**/*.rs",
	"tests/**/*.rs",
]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
log = "0.4"
thiserror = "2.0.17"
chrono = { version = "0.4", features = ["serde"] }
dirs = "6.0.0"
memmap2 = "0.9.9"
nalgebra = { version = "0.33", default-features = false, features = ["std"] }
rayon = "1.11"

[dev-dependencies]
tempfile = "3"
